ARCH=i386

# Toolchain
CC = i686-elf-gcc
LD = i686-elf-ld
AS = nasm

# Musl installation
MUSL_PREFIX := /usr/local/i386-zineos-musl
MUSL_LIBC   := $(MUSL_PREFIX)/lib/libc.a
MUSL_CRT1   := $(MUSL_PREFIX)/lib/crt1.o
MUSL_CRTI   := $(MUSL_PREFIX)/lib/crti.o
MUSL_CRTN   := $(MUSL_PREFIX)/lib/crtn.o
MUSL_INC    := $(MUSL_PREFIX)/include

# Global Paths
USER_DIR        := $(abspath $(dir $(lastword $(MAKEFILE_LIST))))
PROJECT_ROOT    := $(abspath $(USER_DIR)/..)
BUILD_ROOT      := $(PROJECT_ROOT)/build/$(ARCH)
USER_BUILD_ROOT := $(BUILD_ROOT)/user
BIN_DIR         := $(USER_BUILD_ROOT)/bin

LIB_BUILD_DIR := $(USER_BUILD_ROOT)/lib
LIB_ARCHIVE   := $(LIB_BUILD_DIR)/libuser.a
CRT0          := $(USER_BUILD_ROOT)/crt0.o
LIBSYS        := $(BUILD_ROOT)/libc/libc.a

# Flags — when using musl, include its headers instead of ours
CFLAGS  = -ffreestanding -O2 -Wall -Wextra \
          -I$(PROJECT_ROOT)/include \
          -I$(USER_DIR)/include \
          -MMD -MP

MUSL_CFLAGS = -O2 -Wall -Wextra \
              -I$(MUSL_INC) \
              -MMD -MP

LDFLAGS      = -nostdlib -ffreestanding -lgcc -T $(USER_DIR)/linker.ld
MUSL_LDFLAGS = -nostdlib -static -T $(USER_DIR)/linker.ld